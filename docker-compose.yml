services:
  db:
    image: postgres:15-alpine
    container_name: med_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
      POSTGRES_DB: med_database
    volumes:
      - db_data:/var/lib/postgresql/data  # <--- Iska naam neechay se match hona chahiye
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"] # Typo fix: pg_isready (no space)
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  backend:
    build: ./backend
    container_name: medicare_backend
    restart: unless-stopped
    env_file: ./backend/.env # Ye aapki .env se variables khud utha lega
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - SECRET_KEY=${SECRET_KEY}
    volumes:
      - ./backend/data:/app/data
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: medicare_frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    depends_on:
      - backend

# Yahan naam change kar diya taake upar se match ho
volumes:
  db_data: